name: Deploy PWA to GitHub Pages

# 每次 push 到預設分支就自動把 webapp/ 發佈成網站
on:
  push:
    branches: ["main", "feature/quiz-website"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload webapp/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
